name: Daily AI Run Coach

on:
  schedule:
    # 每天台灣時間早上 7:00 執行 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  analyze_garmin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install garminconnect garth google-genai requests

      - name: Run Coach Script
        env:
          GARMIN_HASH: ${{ secrets.GARMIN_HASH }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python coach.py

      - name: Commit Last Activity ID and Coach Memory
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add last_activity_id.txt coach_memory.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracker and coach memory" && git push)
